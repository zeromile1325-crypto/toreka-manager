<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仕入価格表</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif; background: #f8f9fa; color: #1a1a2e; }
.container { max-width: 1100px; margin: 0 auto; padding: 0 16px; }
header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 12px; border-bottom: 2px solid #e0e0e0; }
h1 { font-size: 24px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.updated { font-size: 12px; color: #888; }
.btn { padding: 6px 16px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; }
.btn-green { background: #4CAF50; color: #fff; border: none; font-weight: 500; }
nav { display: flex; gap: 0; margin-top: 16px; }
.tab { padding: 10px 24px; border: 1px solid #ddd; border-bottom: none; background: #f0f0f0; cursor: pointer; font-size: 14px; border-radius: 8px 8px 0 0; color: #666; }
.tab.active { background: #fff; color: #1a1a2e; font-weight: 600; }
main { background: #fff; border: 1px solid #ddd; border-top: none; border-radius: 0 0 8px 8px; padding: 20px; }
.filters { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.filters input { padding: 8px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; flex: 1 1 250px; max-width: 400px; }
.filters select { padding: 8px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; min-width: 160px; }
.info { font-size: 13px; color: #888; margin-bottom: 8px; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { padding: 10px 12px; text-align: left; border-bottom: 2px solid #e0e0e0; cursor: pointer; user-select: none; font-size: 13px; color: #555; white-space: nowrap; }
tr { border-bottom: 1px solid #f0f0f0; }
td { padding: 10px 12px; }
.price { text-align: right; white-space: nowrap; }
.qty { text-align: center; }
.date { font-size: 12px; color: #888; }
.del-btn { border: none; background: none; color: #ccc; cursor: pointer; font-size: 16px; padding: 2px 6px; }
.del-btn:hover { color: #e53935; }
.empty { padding: 40px; text-align: center; color: #aaa; }
.pagination { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 16px; }
.manual { border-top: 1px solid #eee; padding-top: 16px; margin-top: 16px; }
.manual h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.manual p { font-size: 12px; color: #888; margin-bottom: 10px; }
.manual textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: monospace; resize: vertical; }
.manual .actions { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
.msg-ok { font-size: 13px; color: #4CAF50; }
.msg-err { font-size: 13px; color: #e53935; }
.supplier-table th:last-child { width: 100px; }
.alias-input { width: 100%; padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
.btn-save { padding: 4px 12px; border: none; border-radius: 4px; background: #4CAF50; color: #fff; cursor: pointer; font-size: 12px; }
.btn-cancel { padding: 4px 12px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-size: 12px; }
.btn-edit { padding: 4px 12px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-size: 12px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>仕入価格表</h1>
    <div class="header-right">
      <span class="updated" id="lastUpdated"></span>
      <button class="btn" onclick="refresh()">更新</button>
    </div>
  </header>
  <nav>
    <button class="tab active" onclick="switchTab('products',this)">価格表</button>
    <button class="tab" onclick="switchTab('suppliers',this)">仕入先管理</button>
  </nav>
  <main id="tab-products">
    <div class="filters">
      <input type="text" id="search" placeholder="商品名で検索..." oninput="debounceSearch()">
      <select id="supplierFilter" onchange="loadProducts()"><option value="">全仕入先</option></select>
    </div>
    <div class="info" id="productCount"></div>
    <div id="productTable"></div>
    <div class="pagination" id="pagination"></div>
    <div class="manual">
      <h3>手動入力</h3>
      <p>LINEグループの投稿テキストを貼り付けて登録できます。同じ仕入先の既存データは自動で入れ替わります。</p>
      <textarea id="manualText" rows="5" placeholder="【仕入先名】&#10;ポケカ ピカチュウ 3000円 10個&#10;ポケカ リザードン 5000円 5個"></textarea>
      <div class="actions">
        <button class="btn btn-green" onclick="submitManual()">登録</button>
        <span id="manualMsg"></span>
      </div>
    </div>
  </main>
  <main id="tab-suppliers" style="display:none">
    <h2 style="font-size:18px;font-weight:600;margin-bottom:8px">仕入先一覧 / エイリアス管理</h2>
    <p style="font-size:13px;color:#888;margin-bottom:16px">仕入先名の表記揺れをエイリアスとして登録できます。カンマ区切りで複数入力してください。</p>
    <div id="supplierTable"></div>
  </main>
</div>
<script>
const API = '/api';
let products=[], suppliers=[], total=0, page=0, sortBy='posted_at', sortOrder='desc';
const PAGE_SIZE = 50;
let searchTimer;

async function loadProducts() {
  const p = new URLSearchParams();
  const s = document.getElementById('search').value;
  const f = document.getElementById('supplierFilter').value;
  if(s) p.set('search', s);
  if(f) p.set('supplier_id', f);
  p.set('sort_by', sortBy);
  p.set('sort_order', sortOrder);
  p.set('limit', PAGE_SIZE);
  p.set('offset', page * PAGE_SIZE);
  const r = await fetch(`${API}/products?${p}`);
  const d = await r.json();
  products = d.products || [];
  total = d.total || 0;
  renderProducts();
  document.getElementById('lastUpdated').textContent = '最終更新: ' + new Date().toLocaleTimeString('ja-JP');
}

async function loadSuppliers() {
  const r = await fetch(`${API}/suppliers`);
  suppliers = await r.json();
  renderSupplierFilter();
  renderSuppliers();
}

function renderProducts() {
  document.getElementById('productCount').textContent = `${total} 件の商品`;
  if(!products.length) { document.getElementById('productTable').innerHTML = '<div class="empty">商品データがありません</div>'; document.getElementById('pagination').innerHTML=''; return; }
  const icon = (k) => sortBy===k ? (sortOrder==='asc'?' ▲':' ▼') : '';
  let h = '<table><thead><tr>';
  [['supplier_name','仕入先'],['product_name','商品名'],['price','価格'],['quantity','数量'],['posted_at','投稿日時']].forEach(([k,l])=>{
    h += `<th onclick="doSort('${k}')">${l}${icon(k)}</th>`;
  });
  h += '<th></th></tr></thead><tbody>';
  products.forEach(p => {
    const d = p.posted_at ? new Date(p.posted_at).toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
    h += `<tr><td>${esc(p.supplier_name)}</td><td style="font-weight:500">${esc(p.product_name)}</td><td class="price">${p.price.toLocaleString()}円</td><td class="qty">${p.quantity!=null?p.quantity:'-'}</td><td class="date">${d}</td><td><button class="del-btn" onclick="delProduct(${p.id},'${esc(p.product_name)}')">×</button></td></tr>`;
  });
  h += '</tbody></table>';
  document.getElementById('productTable').innerHTML = h;
  const tp = Math.ceil(total/PAGE_SIZE);
  document.getElementById('pagination').innerHTML = tp>1 ? `<button class="btn" ${page===0?'disabled':''} onclick="page--;loadProducts()">前へ</button><span style="font-size:13px;color:#666">${page+1} / ${tp}</span><button class="btn" ${page>=tp-1?'disabled':''} onclick="page++;loadProducts()">次へ</button>` : '';
}

function renderSupplierFilter() {
  const sel = document.getElementById('supplierFilter');
  const v = sel.value;
  sel.innerHTML = '<option value="">全仕入先</option>' + suppliers.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
  sel.value = v;
}

function renderSuppliers() {
  if(!suppliers.length) { document.getElementById('supplierTable').innerHTML='<div class="empty">仕入先データがありません</div>'; return; }
  let h = '<table class="supplier-table"><thead><tr><th>正式名</th><th>エイリアス（別名）</th><th>操作</th></tr></thead><tbody>';
  suppliers.forEach(s => {
    h += `<tr><td>${esc(s.name)}</td><td id="alias-display-${s.id}">${s.aliases.length?esc(s.aliases.join(', ')):'-'}</td><td id="alias-action-${s.id}"><button class="btn-edit" onclick="editAlias(${s.id},'${esc(s.aliases.join(', '))}')">編集</button></td></tr>`;
  });
  h += '</tbody></table>';
  document.getElementById('supplierTable').innerHTML = h;
}

function editAlias(id, current) {
  document.getElementById(`alias-display-${id}`).innerHTML = `<input class="alias-input" id="alias-input-${id}" value="${current}" placeholder="仕入先A, 仕入A, SupplierA">`;
  document.getElementById(`alias-action-${id}`).innerHTML = `<div style="display:flex;gap:6px"><button class="btn-save" onclick="saveAlias(${id})">保存</button><button class="btn-cancel" onclick="loadSuppliers()">取消</button></div>`;
}

async function saveAlias(id) {
  const v = document.getElementById(`alias-input-${id}`).value;
  const aliases = v.split(/[,、]/).map(s=>s.trim()).filter(Boolean);
  await fetch(`${API}/suppliers/${id}/aliases`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({aliases}) });
  loadSuppliers();
}

function doSort(field) {
  if(sortBy===field) sortOrder = sortOrder==='asc'?'desc':'asc';
  else { sortBy=field; sortOrder='asc'; }
  page=0; loadProducts();
}

function debounceSearch() { clearTimeout(searchTimer); searchTimer=setTimeout(()=>{page=0;loadProducts()},300); }

async function delProduct(id, name) {
  if(!confirm(`「${name}」を削除しますか？`)) return;
  await fetch(`${API}/products/${id}`, {method:'DELETE'});
  refresh();
}

async function submitManual() {
  const text = document.getElementById('manualText').value;
  if(!text.trim()) return;
  const r = await fetch(`${API}/products/parse`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text})});
  const d = await r.json();
  const msg = document.getElementById('manualMsg');
  if(d.error) { msg.className='msg-err'; msg.textContent=d.error; }
  else { msg.className='msg-ok'; msg.textContent=`${d.supplier}: ${d.itemCount}件登録${d.replaced>0?' (旧'+d.replaced+'件を入替)':''}`; document.getElementById('manualText').value=''; refresh(); }
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-products').style.display = tab==='products'?'':'none';
  document.getElementById('tab-suppliers').style.display = tab==='suppliers'?'':'none';
}

function refresh() { loadProducts(); loadSuppliers(); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
